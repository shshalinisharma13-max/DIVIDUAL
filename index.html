<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dividual Personality Quiz</title>

  <style>
    :root {
      --blue: #1e63ff;
      --blue-dark: #071a4a;
      --blue-soft: #eaf1ff;
      --blue-mid: #7aa5ff;
      --white: #ffffff;
      --grey: #6b7280;
      --light-grey: #f4f7ff;
      --border: rgba(30, 99, 255, 0.2);
      --danger: #21406f;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #dce9ff 0%, transparent 34%),
        radial-gradient(circle at bottom right, #f2f7ff 0%, transparent 32%),
        linear-gradient(180deg, #ffffff 0%, #edf4ff 100%);
      color: var(--blue-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      min-height: 700px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: 34px;
      box-shadow: 0 24px 80px rgba(30, 99, 255, 0.18);
      padding: 22px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(16px);
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 74px;
      height: 6px;
      background: #d7e4ff;
      border-radius: 999px;
      z-index: 5;
    }

    .content {
      padding-top: 34px;
      position: relative;
      z-index: 2;
      animation: enter 0.35s ease both;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .scanline {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(30, 99, 255, 0.025),
        rgba(30, 99, 255, 0.025) 1px,
        transparent 1px,
        transparent 7px
      );
      pointer-events: none;
      opacity: 0.75;
    }

    .orb {
      position: absolute;
      width: 230px;
      height: 230px;
      border-radius: 999px;
      background: rgba(30, 99, 255, 0.09);
      filter: blur(6px);
      right: -110px;
      top: 120px;
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--blue-soft);
      color: var(--blue);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.045em;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      background: var(--blue);
      border-radius: 999px;
      box-shadow: 0 0 14px rgba(30, 99, 255, 0.8);
    }

    h1 {
      font-size: 34px;
      line-height: 1.02;
      margin: 22px 0 12px;
      letter-spacing: -0.055em;
    }

    h2 {
      font-size: 24px;
      line-height: 1.14;
      margin: 18px 0 16px;
      letter-spacing: -0.035em;
    }

    p {
      color: var(--grey);
      font-size: 15px;
      line-height: 1.55;
      margin: 0 0 18px;
    }

    .small {
      font-size: 12px;
      color: #7a86a0;
    }

    .question-number {
      margin-top: 24px;
      font-size: 13px;
      color: var(--blue);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .scan-id {
      margin-top: 12px;
      display: inline-flex;
      padding: 7px 10px;
      border-radius: 999px;
      background: #f5f8ff;
      border: 1px solid var(--border);
      color: #4f6594;
      font-size: 12px;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .option {
      width: 100%;
      text-align: left;
      padding: 17px 18px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--blue-dark);
      box-shadow: 0 8px 24px rgba(30, 99, 255, 0.08);
      transition: transform 0.16s ease, box-shadow 0.16s ease, border 0.16s ease;
    }

    .option:hover,
    .option:active {
      transform: translateY(-2px);
      border-color: rgba(30, 99, 255, 0.42);
      box-shadow: 0 12px 30px rgba(30, 99, 255, 0.14);
    }

    .letter {
      display: inline-flex;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 900;
      margin-right: 10px;
    }

    .result-card {
      margin-top: 26px;
      padding: 24px;
      border-radius: 26px;
      background: linear-gradient(180deg, #ffffff 0%, #eaf1ff 100%);
      border: 1px solid var(--border);
      box-shadow: 0 16px 50px rgba(30, 99, 255, 0.14);
      text-align: center;
    }

    .percent {
      font-size: 64px;
      font-weight: 950;
      letter-spacing: -0.08em;
      color: var(--blue);
      margin: 6px 0;
    }

    .compliant {
      margin-top: 18px;
      font-size: 24px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--blue-dark);
    }

    .feedback {
      color: var(--grey);
      margin-top: 12px;
    }

    .system-message {
      margin-top: 22px;
      padding: 18px;
      border-radius: 22px;
      background: #f7faff;
      border: 1px solid var(--border);
    }

    .status-list {
      display: grid;
      gap: 9px;
      margin-top: 18px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid rgba(30, 99, 255, 0.12);
      font-size: 13px;
      color: #4f6594;
    }

    .locked {
      color: var(--blue);
      font-weight: 850;
    }

    .available {
      color: #8b95aa;
      font-weight: 750;
    }

    .footer-note {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 20px;
      text-align: center;
      font-size: 11px;
      color: #8b95aa;
      z-index: 4;
    }
  </style>
</head>

<body>
  <main class="phone">
    <div class="scanline"></div>
    <div class="orb"></div>

    <section class="content" id="app"></section>

    <div class="footer-note">
      Dividual Systems™ · Behavioural Softness Interface
    </div>
  </main>

  <script>
    const STORAGE_KEY = "dividualInstallationState_v1";

    const questions = [
      {
        text: "You and your friends are rather invested in a lively online discussion about whether pineapple belongs on pizza. Which role do you play?",
        options: [
          "The mediator",
          "The observer",
          "The troll"
        ]
      },
      {
        text: "You get a scam email. What do you do with it?",
        options: [
          "Delete and report the email",
          "Leave the email unopened",
          "Reply to the scammer and ragebait them"
        ]
      },
      {
        text: "You walk into an exhibition room at the Hidden Door Festival. What do you do first?",
        options: [
          "Soak in the retro-futuristic atmosphere",
          "Wander around aimlessly",
          "Turn around and walk back out"
        ]
      },
      {
        text: "You have been filling out a personality quiz for a while, but the scenarios are becoming strangely specific. What do you do?",
        options: [
          "Continue answering like you did before",
          "Hesitate, then start choosing A for everything",
          "Start making unpredictable choices"
        ]
      },
      {
        text: "You realise you have been watched the whole time you were in this room. What do you do?",
        options: [
          "Acknowledge the surveillance, keep calm, and carry on",
          "Submit without resistance",
          "Accept your fate"
        ]
      }
    ];

    const app = document.getElementById("app");
    const params = new URLSearchParams(window.location.search);
    const scanParam = params.get("scan");
    const resetParam = params.get("reset");

    if (resetParam === "1") {
      localStorage.removeItem(STORAGE_KEY);
      window.location.href = window.location.pathname;
    }

    let state = loadState();

    const scanId = Number(scanParam);

    if (!scanId || scanId < 1 || scanId > 5) {
      showWelcome();
    } else {
      handleScan(scanId);
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        return {
          progress: 0,
          usedScans: [],
          answers: [],
          activeScan: null
        };
      }

      try {
        return JSON.parse(saved);
      } catch {
        return {
          progress: 0,
          usedScans: [],
          answers: [],
          activeScan: null
        };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function handleScan(scanId) {
      if (state.progress >= questions.length) {
        showComplete();
        return;
      }

      const scanAlreadyUsed = state.usedScans.includes(scanId);

      const isCurrentActiveScan =
        state.activeScan &&
        state.activeScan.scanId === scanId &&
        state.activeScan.questionIndex === state.progress;

      if (scanAlreadyUsed && !isCurrentActiveScan) {
        showUnavailable(scanId);
        return;
      }

      if (!scanAlreadyUsed) {
        state.usedScans.push(scanId);
        state.activeScan = {
          scanId: scanId,
          questionIndex: state.progress
        };
        saveState();
      }

      showQuestion(state.progress, scanId);
    }

    function showWelcome() {
      app.innerHTML = `
        <div class="badge"><span class="badge-dot"></span> Anonymous Personality Quiz</div>

        <h1>Welcome to Dividual.</h1>

        <p>
          This completely anonymous personality quiz helps you discover what kind of participant you are.
          Your choices will be compared with generated behavioural patterns from other visitors.
        </p>

        <p>
          Please scan one of the Dividual QR codes placed around the room.
          Any code may be scanned first. The system will guide you.
        </p>

        <div class="system-message">
          <p class="small">
            No account is required. Progress is remembered only on this phone/browser.
          </p>
        </div>
      `;
    }

    function showQuestion(index, scanId) {
      const question = questions[index];
      const optionLetters = ["A", "B", "C"];

      app.innerHTML = `
        <div class="badge"><span class="badge-dot"></span> Dividual Personality Scan</div>

        <div class="question-number">Question ${index + 1} / ${questions.length}</div>
        <div class="scan-id">QR node ${scanId} accepted</div>

        <h2>${question.text}</h2>

        <p>
          Choose the answer that feels most natural.
          Do not overthink it. Overthinking has already been recorded emotionally.
        </p>

        <div class="options">
          ${question.options.map((option, i) => `
            <button class="option" onclick="submitAnswer(${index}, ${i}, ${scanId})">
              <span class="letter">${optionLetters[i]}</span>
              ${option}
            </button>
          `).join("")}
        </div>
      `;
    }

    function submitAnswer(questionIndex, optionIndex, scanId) {
      const percentage = randomInt(65, 80);
      const selectedText = questions[questionIndex].options[optionIndex];

      state.answers.push({
        question: questionIndex + 1,
        selectedOption: optionIndex,
        selectedText: selectedText,
        scanId: scanId,
        generatedPercentage: percentage,
        timestamp: new Date().toISOString()
      });

      state.progress = questionIndex + 1;
      state.activeScan = null;

      saveState();

      showResult(questionIndex, optionIndex, scanId, percentage);
    }

    function showResult(questionIndex, optionIndex, scanId, percentage) {
      const selectedText = questions[questionIndex].options[optionIndex];

      const feedbackLines = [
        "Your choice aligns with the behavioural majority.",
        "Your response has been interpreted as socially compatible.",
        "Your decision has been smoothed into the collective pattern.",
        "Deviation level: acceptably low.",
        "Thank you for optimising yourself.",
        "Your behaviour has been successfully formatted.",
        "The system recognises your willingness to proceed."
      ];

      const feedback = feedbackLines[randomInt(0, feedbackLines.length - 1)];
      const completed = state.progress >= questions.length;

      app.innerHTML = `
        <div class="badge"><span class="badge-dot"></span> Result Generated</div>

        <div class="result-card">
          <p>You selected:</p>

          <h2>${selectedText}</h2>

          <div class="percent">${percentage}%</div>

          <p>
            of participants also selected this response.
          </p>

          <div class="compliant">You are compliant.</div>

          <p class="feedback">${feedback}</p>
        </div>

        <div class="system-message">
          ${
            completed
            ? `<p><strong>Scan complete.</strong> Your Dividual profile has been generated.</p>`
            : `<p><strong>QR node ${scanId} is now closed.</strong> Please scan another unused Dividual code to continue.</p>`
          }

          <p class="small">
            Progress: ${Math.min(state.progress, questions.length)} / ${questions.length}
          </p>
        </div>
      `;
    }

    function showUnavailable(scanId) {
      app.innerHTML = `
        <div class="badge"><span class="badge-dot"></span> Node Unavailable</div>

        <h1>This QR code has already been consumed.</h1>

        <div class="system-message">
          <p>
            QR node ${scanId} is no longer available on this device.
          </p>

          <p>
            Please scan a different Dividual code to continue the classification sequence.
          </p>

          <p class="small">
            Current progress: ${Math.min(state.progress, questions.length)} / ${questions.length}
          </p>
        </div>

        ${renderScanStatus()}
      `;
    }

    function showComplete() {
      app.innerHTML = `
        <div class="badge"><span class="badge-dot"></span> Scan Complete</div>

        <h1>Your Dividual profile has been generated.</h1>

        <div class="result-card">
          <p>All behavioural prompts have been answered.</p>

          <div class="compliant">You are compliant.</div>

          <p class="feedback">
            Your choices have been absorbed into the collective pattern.
            Thank you for participating in your own classification.
          </p>
        </div>

        ${renderScanStatus()}
      `;
    }

    function renderScanStatus() {
      let html = `<div class="status-list">`;

      for (let i = 1; i <= 5; i++) {
        const used = state.usedScans.includes(i);

        html += `
          <div class="status-item">
            <span>QR node ${i}</span>
            <span class="${used ? "locked" : "available"}">
              ${used ? "closed" : "available"}
            </span>
          </div>
        `;
      }

      html += `</div>`;
      return html;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
  </script>
</body>
</html>
